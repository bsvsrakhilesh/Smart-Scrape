services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: SmartScrape
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in a root .env file or shell before production deploy}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d SmartScrape"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    image: smartscrape-backend:prod
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    init: true
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 4000
      FILE_STORAGE_DIR: /data
      CHROMIUM_EXECUTABLE_PATH: /usr/bin/chromium
      TAGGER_PY_URL: http://ai-tagger:7071
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS to your production origin, for example https://example.com}
      DEV_AUTH_ENABLED: "false"
      TRUST_PROXY: "1"
    expose:
      - "4000"
    volumes:
      - backend_storage:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-tagger:
        condition: service_healthy

  backend-worker:
    image: smartscrape-backend:prod
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    init: true
    command: node dist/worker.js
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      FILE_STORAGE_DIR: /data
      CHROMIUM_EXECUTABLE_PATH: /usr/bin/chromium
      TAGGER_PY_URL: http://ai-tagger:7071
      REDIS_URL: redis://redis:6379/0
      DEV_AUTH_ENABLED: "false"
      INGESTION_QUEUE_CONCURRENCY: 2
      AI_TAG_URL_QUEUE_CONCURRENCY: 1
      AI_TAG_FILE_QUEUE_CONCURRENCY: 2
    volumes:
      - backend_storage:/data
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      ai-tagger:
        condition: service_healthy

  frontend:
    image: smartscrape-frontend:prod
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    init: true
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  ai-tagger:
    image: smartscrape-ai-tagger:prod
    build:
      context: ./ai-tagger
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    environment:
      PORT: 7071
      REDIS_URL: redis://redis:6379/0
      JOB_SOFT_LIMIT: 240
      JOB_HARD_LIMIT: 300
      URL_CONNECT_TIMEOUT: 8
      URL_READ_TIMEOUT: 20
      TAGGER_CACHE_NS: tagger:v1
      TAGGER_SHARED_FILE_ROOTS: /data,/ingress
      TAGGER_INGRESS_DIR: /ingress
      AI_TAGGER_WORKER_CONCURRENCY: 2
    env_file:
      - ./ai-tagger/.env
    expose:
      - "7071"
    volumes:
      - backend_storage:/data:ro
      - ai_tagger_ingress:/ingress
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app:app --host 0.0.0.0 --port 7071 --no-access-log

  ai-tagger-worker:
    image: smartscrape-ai-tagger:prod
    build:
      context: ./ai-tagger
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    environment:
      REDIS_URL: redis://redis:6379/0
      JOB_SOFT_LIMIT: 240
      JOB_HARD_LIMIT: 300
      URL_CONNECT_TIMEOUT: 8
      URL_READ_TIMEOUT: 20
      TAGGER_CACHE_NS: tagger:v1
      TAGGER_SHARED_FILE_ROOTS: /data,/ingress
      TAGGER_INGRESS_DIR: /ingress
    env_file:
      - ./ai-tagger/.env
    volumes:
      - backend_storage:/data:ro
      - ai_tagger_ingress:/ingress
    depends_on:
      redis:
        condition: service_healthy
    command: sh -c "celery -A tasks:CELERY worker -l info --concurrency=$${AI_TAGGER_WORKER_CONCURRENCY:-2}"

volumes:
  db_data:
  redis_data:
  backend_storage:
  ai_tagger_ingress:
