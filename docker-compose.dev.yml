services:
  db:
    image: pgvector/pgvector:pg16
    container_name: smartscrape_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: SmartScrape
    env_file:
      - ./backend/.env
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d SmartScrape"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: smartscrape_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: smartscrape-backend:dev
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: base
    container_name: smartscrape_backend
    init: true
    command: sh ./docker-dev-entrypoint.sh api
    working_dir: /app
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 4000
      FILE_STORAGE_DIR: /data
      CHROMIUM_EXECUTABLE_PATH: /usr/bin/chromium
      TAGGER_PY_URL: http://ai-tagger:7071
      REDIS_URL: redis://redis:6379/0
      EXTRACT_URL_TIMEOUT_MS: 30000
      ICN_ENABLED: "true"
      ICN_BASE_URL: http://host.docker.internal:7081
      ICN_TIMEOUT_MS: 120000
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_storage:/data
      - ./backend/.env:/app/.env:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend-worker:
    image: smartscrape-backend:dev
    container_name: smartscrape_backend_worker
    init: true
    working_dir: /app
    command: sh ./docker-dev-entrypoint.sh worker
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379/0
      TAGGER_PY_URL: http://ai-tagger:7071
      FILE_STORAGE_DIR: /data
      CHROMIUM_EXECUTABLE_PATH: /usr/bin/chromium
      EXTRACT_URL_TIMEOUT_MS: 30000
      INGESTION_QUEUE_CONCURRENCY: 2
      AI_TAG_URL_QUEUE_CONCURRENCY: 1
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_storage:/data
      - ./backend/.env:/app/.env:ro
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    image: smartscrape-frontend:dev
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: smartscrape_frontend
    init: true
    working_dir: /app
    command: sh ./docker-dev-entrypoint.sh
    environment:
      CHOKIDAR_USEPOLLING: "1"
      VITE_WATCH_INTERVAL: "300"
      API_PROXY_TARGET: http://backend:4000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  ai-tagger:
    image: smartscrape-ai-tagger:dev
    build:
      context: ./ai-tagger
      dockerfile: Dockerfile
    container_name: smartscrape_ai_tagger
    init: true
    environment:
      PORT: 7071
      REDIS_URL: redis://redis:6379/0
      JOB_SOFT_LIMIT: 240
      JOB_HARD_LIMIT: 300
      URL_CONNECT_TIMEOUT: 8
      URL_READ_TIMEOUT: 20
      TAGGER_CACHE_NS: tagger:v1
      TAGGER_SHARED_FILE_ROOTS: /data,/ingress
      TAGGER_INGRESS_DIR: /ingress
    env_file:
      - ./ai-tagger/.env
    volumes:
      - backend_storage:/data:ro
      - ai_tagger_ingress:/ingress
    ports:
      - "127.0.0.1:7071:7071"
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app:app --host 0.0.0.0 --port 7071

  ai-tagger-worker:
    image: smartscrape-ai-tagger:dev
    container_name: smartscrape_ai_tagger_worker
    init: true
    environment:
      REDIS_URL: redis://redis:6379/0
      JOB_SOFT_LIMIT: 240
      JOB_HARD_LIMIT: 300
      URL_CONNECT_TIMEOUT: 8
      URL_READ_TIMEOUT: 20
      TAGGER_CACHE_NS: tagger:v1
      TAGGER_SHARED_FILE_ROOTS: /data,/ingress
      TAGGER_INGRESS_DIR: /ingress
    env_file:
      - ./ai-tagger/.env
    volumes:
      - backend_storage:/data:ro
      - ai_tagger_ingress:/ingress
    depends_on:
      redis:
        condition: service_healthy
    command: sh -c "celery -A tasks:CELERY worker -l info --concurrency=1"

volumes:
  db_data:
  backend_node_modules:
  frontend_node_modules:
  backend_storage:
  ai_tagger_ingress:
