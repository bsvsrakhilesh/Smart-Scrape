services:
  db:
    image: pgvector/pgvector:pg16
    container_name: smartscrape_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: SmartScrape
    env_file:
      - ./backend/.env
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d SmartScrape"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: smartscrape_redis

  backend:
    image: smartscrape-backend:dev
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: base   # use the base image (chromium + deps)
    container_name: smartscrape_backend
    command: sh -c "echo 'Waiting for db:5432…' && i=0; until node -e \"const net=require('net'); const s=net.createConnection({host:'db',port:5432}); s.on('connect',()=>process.exit(0)); s.on('error',()=>process.exit(1)); setTimeout(()=>process.exit(1),1000);\"; do i=$$((i+1)); if [ $$i -ge 30 ]; then echo 'Postgres not ready after ~60s'; exit 1; fi; echo \"  still waiting ($$i/30)\"; sleep 2; done && echo 'Postgres is up' && ([ -f package-lock.json ] && npm ci || npm install) && npx prisma generate && npx prisma migrate deploy && npm run dev"
    working_dir: /app
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 4000
      # File storage inside container (persisted via volume)
      FILE_STORAGE_DIR: /data
      # Talk to AI Tagger over the compose network
      TAGGER_PY_URL: http://ai-tagger:7071
      REDIS_URL: redis://redis:6379/0
      EXTRACT_URL_TIMEOUT_MS: 30000
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]

    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_storage:/data
      - ./backend/.env:/app/.env:ro
    ports: 
    - "127.0.0.1:4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
  
  backend-worker:
    image: smartscrape-backend-worker:dev
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: base
    container_name: smartscrape_backend_worker
    working_dir: /app
    command: sh -c "set -e; ([ -f package-lock.json ] && npm ci || npm install) && npx prisma generate && npm run worker"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379/0
      TAGGER_PY_URL: http://ai-tagger:7071
      FILE_STORAGE_DIR: /data
      EXTRACT_URL_TIMEOUT_MS: 30000
      INGESTION_QUEUE_CONCURRENCY: 2
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_storage:/data
      - ./backend/.env:/app/.env:ro
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: smartscrape_frontend
    working_dir: /app
    command: sh -c "([ -f package-lock.json ] && npm ci || npm install) && npm run dev -- --host --port 3000"
    environment:
      CHOKIDAR_USEPOLLING: "1"   # file watching in Docker on Mac/Win
      VITE_WATCH_INTERVAL: "300"
      API_PROXY_TARGET: "http://backend:4000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

  ai-tagger:
    image: smartscrape-ai-tagger:dev
    build:
      context: ./ai-tagger
      dockerfile: Dockerfile
    container_name: smartscrape_ai_tagger
    environment:
      PORT: 7071
      REDIS_URL: redis://redis:6379/0
      JOB_SOFT_LIMIT: 120
      JOB_HARD_LIMIT: 180
      URL_CONNECT_TIMEOUT: 8
      URL_READ_TIMEOUT: 20
      TAGGER_CACHE_NS: tagger:v1
    env_file:
      - ./ai-tagger/.env
    ports:
      - "127.0.0.1:7071:7071"
    depends_on:
      - redis
    command: uvicorn app:app --host 0.0.0.0 --port 7071

  ai-tagger-worker:
    image: smartscrape-ai-tagger:dev
    build:
      context: ./ai-tagger
      dockerfile: Dockerfile
    container_name: smartscrape_ai_tagger_worker
    environment:
      REDIS_URL: redis://redis:6379/0
      JOB_SOFT_LIMIT: 120
      JOB_HARD_LIMIT: 180
      URL_CONNECT_TIMEOUT: 8
      URL_READ_TIMEOUT: 20
      TAGGER_CACHE_NS: tagger:v1
    env_file:
      - ./ai-tagger/.env
    depends_on:
      - redis
    command: sh -c "celery -A tasks:CELERY worker -l info --concurrency=2"

volumes:
  db_data:
  backend_node_modules:
  frontend_node_modules:
  backend_storage:
